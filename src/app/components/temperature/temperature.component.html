<div class="card shadow p-4">
  <h3 class="text-primary mb-3">Temperature Converter — computed()</h3>

  <div class="mb-4">
    <label class="form-label fw-bold">
      Celsius: {{ celsius() }}°C
    </label>
    <input type="range" class="form-range"
           min="-50" max="60"
           [value]="celsius()"
           (input)="updateCelsius(+$any($event.target).value)" />
  </div>

  <div class="row text-center g-3">
    <div class="col-md-4">
      <div class="card bg-primary text-white p-3">
        <h6>Celsius</h6>
        <h2>{{ celsius() }}°C</h2>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card bg-danger text-white p-3">
        <h6>Fahrenheit</h6>
        <h2>{{ fahrenheit() | number:'1.1-1' }}°F</h2>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card bg-dark text-white p-3">
        <h6>Kelvin</h6>
        <h2>{{ kelvin() | number:'1.1-1' }}K</h2>
      </div>
    </div>
  </div>

  <div class="mt-3 text-center">
    <span class="badge bg-{{ status().color }} fs-6 p-2">
      Status: {{ status().label }}
    </span>
  </div>
</div>
